<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="180" r="280" fill="url(#glow)"/>
  <circle cx="200" cy="500" r="240" fill="url(#glow)"/>

  <!-- dot pattern hint -->
  <g fill="#6366f1" fill-opacity="0.15">
    <circle cx="100" cy="100" r="2"/>
    <circle cx="200" cy="100" r="2"/>
    <circle cx="300" cy="100" r="2"/>
    <circle cx="100" cy="200" r="2"/>
    <circle cx="200" cy="200" r="2"/>
    <circle cx="300" cy="200" r="2"/>
  </g>

  <text x="80" y="290" font-family="'Inter', system-ui, sans-serif" font-size="32" fill="#94a3b8" font-weight="500">
    Portfolio
  </text>
  <text x="80" y="400" font-family="'Inter', system-ui, sans-serif" font-size="92" fill="url(#text)" font-weight="800">
    정종인 · Jeong Jong-in
  </text>
  <text x="80" y="470" font-family="'Inter', system-ui, sans-serif" font-size="40" fill="#f1f5f9" font-weight="600">
    AI Engineer / Backend Developer
  </text>
  <text x="80" y="540" font-family="'Inter', system-ui, sans-serif" font-size="24" fill="#94a3b8">
    Multimodal AI · PyTorch · TypeScript · Python
  </text>
